<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AARPO ★ SET LIST</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --neon:#ff2e88; --cyan:#00f0ff; --yellow:#ffe600; --green:#39ff14;
  --purple:#9d00ff; --bg:#0a0420; --panel:#160a33; --fs:20px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(circle at 50% -10%, #2a0a55 0%, var(--bg) 60%),
    repeating-linear-gradient(0deg, rgba(0,240,255,.04) 0 2px, transparent 2px 4px);
  color:#fff; font-family:'VT323','Courier New',monospace; font-size:20px;
  -webkit-font-smoothing:none;
}
body.songmode{overflow:hidden;}            /* lock scroll while playing */
body::before{
  content:"";position:fixed;left:-50%;right:-50%;bottom:-20%;height:55vh;
  background:
    linear-gradient(transparent 0%, rgba(157,0,255,.13) 100%),
    repeating-linear-gradient(90deg, rgba(0,240,255,.30) 0 2px, transparent 2px 40px),
    repeating-linear-gradient(0deg, rgba(0,240,255,.30) 0 2px, transparent 2px 40px);
  transform:perspective(300px) rotateX(70deg);transform-origin:bottom;
  z-index:0;pointer-events:none;animation:grid 6s linear infinite;}
@keyframes grid{from{background-position:0 0,0 0,0 0;}to{background-position:0 0,0 40px,0 40px;}}
.crt{position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;}
.crt::after{content:"";position:fixed;inset:0;box-shadow:inset 0 0 200px rgba(0,0,0,.9);}
.wrap{position:relative;z-index:10;max-width:1000px;margin:0 auto;padding:24px 16px 60px;}
.hidden{display:none!important;}

.title{font-family:'Press Start 2P',monospace;text-align:center;line-height:1.5;}
.title .big{font-size:34px;color:var(--yellow);
  text-shadow:3px 3px 0 var(--neon),6px 6px 0 var(--purple);letter-spacing:2px;}
.title .sub{font-size:14px;color:var(--cyan);margin-top:14px;
  text-shadow:2px 2px 0 #003;animation:blink 1.1s steps(1) infinite;}
@keyframes blink{50%{opacity:.25;}}
.h2{font-family:'Press Start 2P',monospace;font-size:15px;color:var(--green);
  text-shadow:2px 2px 0 #000;margin:6px 0 18px;text-align:center;letter-spacing:1px;}
.insert{font-family:'Press Start 2P',monospace;font-size:10px;color:#9fb;
  text-align:center;margin-top:8px;opacity:.7;}

.players{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:30px;}
.pcard{cursor:pointer;border:4px solid var(--cyan);background:var(--panel);
  padding:26px 14px;text-align:center;position:relative;
  box-shadow:0 0 0 4px #000,6px 6px 0 var(--purple);transition:transform .08s,box-shadow .08s;}
.pcard:hover,.pcard:focus{transform:translate(-2px,-2px);
  box-shadow:0 0 0 4px #000,9px 9px 0 var(--neon);outline:none;border-color:var(--yellow);}
.pcard .ava{font-size:46px;line-height:1;}
.pcard .pname{font-family:'Press Start 2P',monospace;font-size:14px;margin-top:14px;color:var(--yellow);}
.pcard .role{font-size:18px;color:var(--cyan);margin-top:6px;}

.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.badge{font-family:'Press Start 2P',monospace;font-size:11px;color:#000;
  background:var(--green);padding:8px 12px;border:3px solid #000;box-shadow:3px 3px 0 var(--purple);}
.btn{font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;color:#000;
  background:var(--yellow);border:3px solid #000;padding:9px 12px;box-shadow:3px 3px 0 var(--neon);transition:transform .06s;}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--neon);}
.btn.alt{background:var(--cyan);}
.btn.sm{font-size:9px;padding:7px 9px;}
.tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.track{cursor:pointer;border:3px solid var(--neon);background:var(--panel);padding:14px;
  display:flex;align-items:center;gap:12px;box-shadow:4px 4px 0 #000;
  transition:transform .07s,box-shadow .07s;position:relative;}
.track:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--cyan);border-color:var(--yellow);}
.track .num{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--cyan);min-width:34px;}
.track .tname{font-size:22px;color:#fff;line-height:1.1;}
.track .you{position:absolute;top:6px;right:8px;font-size:13px;}
.track.empty{opacity:.55;border-style:dashed;}
.tag-tbd{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow);display:block;margin-top:4px;}

/* ===================== SONG VIEW (single-page, no-scroll) ===================== */
#screen-song{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;
  padding:8px 12px 8px;}
#screen-song.on{display:flex;}
.songbar{display:flex;align-items:center;gap:10px;flex-wrap:nowrap;margin-bottom:4px;}
.songbar .sname{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--yellow);
  text-shadow:2px 2px 0 var(--neon);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.songbar .meta{font-size:15px;color:var(--cyan);white-space:nowrap;}
.fontctl{display:flex;gap:4px;}

/* column headers */
.colhdr{display:grid;grid-template-columns:1fr;gap:0;}
.song-body{flex:1;min-height:0;overflow:hidden;column-gap:20px;column-fill:balance;}
.section{break-inside:auto;margin-bottom:6px;}
.sechead{font-family:'Press Start 2P',monospace;
  font-size:calc(var(--fs)*0.62);color:#fff;background:var(--purple);
  padding:4px 7px;letter-spacing:1px;text-shadow:1px 1px 0 #000;
  break-after:avoid;margin-bottom:2px;}
.row{display:grid;grid-template-columns:1.1fr 1.15fr 1fr;gap:8px;
  padding:2px 6px;align-items:start;break-inside:avoid;
  border-bottom:1px solid rgba(0,240,255,.12);}
.row:nth-child(odd){background:rgba(0,240,255,.04);}
.c-line{font-size:var(--fs);color:#fff;line-height:1.15;}
.c-line .tm{font-family:'Press Start 2P',monospace;font-size:calc(var(--fs)*0.5);
  color:#000;background:var(--yellow);padding:1px 4px;margin-left:5px;border:1px solid #000;}
.c-chord{font-family:'Courier New',monospace;font-size:calc(var(--fs)*0.95);
  color:var(--cyan);white-space:pre-wrap;line-height:1.15;text-shadow:0 0 5px rgba(0,240,255,.45);}
.c-mine{font-size:calc(var(--fs)*0.92);color:var(--green);line-height:1.15;
  background:rgba(57,255,20,.10);border-left:4px solid var(--green);padding:1px 6px;}
.c-mine.empty{background:none;border-left:4px solid rgba(255,255,255,.08);color:#445;}
.dim{opacity:.35;}
.note{text-align:center;color:var(--yellow);font-size:22px;padding:40px;}

/* sticky column legend under bar */
.headrow{display:grid;grid-template-columns:1.1fr 1.15fr 1fr;gap:8px;padding:2px 6px;
  font-family:'Press Start 2P',monospace;font-size:9px;margin-bottom:3px;
  border-bottom:2px solid var(--neon);}
.headrow .a{color:#fff;} .headrow .b{color:var(--cyan);} .headrow .c{color:var(--green);}

.footer{text-align:center;margin-top:30px;font-size:14px;color:#557;}
@media(max-width:560px){.players{grid-template-columns:1fr;}.title .big{font-size:24px;}}
</style>
</head>
<body>
<div class="crt"></div>

<div class="wrap" id="wrap">
  <!-- SCREEN 1 -->
  <section id="screen-player">
    <div class="title"><div class="big">AARPO</div><div class="sub">★ SET LIST ★</div></div>
    <div class="h2">SELECT YOUR PLAYER</div>
    <div class="players" id="playerGrid"></div>
    <div class="insert">© 198X AARPO BAND ◆ INSERT COIN</div>
  </section>
  <!-- SCREEN 2 -->
  <section id="screen-tracks" class="hidden">
    <div class="bar">
      <span class="badge" id="whoBadge">P1</span>
      <div class="title" style="flex:1"><div class="sub" style="font-size:11px">SELECT TRACK</div></div>
      <button class="btn alt" onclick="goPlayer()">⮜ CHANGE PLAYER</button>
    </div>
    <div class="tracks" id="trackGrid"></div>
  </section>
</div>

<!-- SCREEN 3 : full-screen, fits on one page -->
<section id="screen-song">
  <div class="songbar">
    <button class="btn sm" onclick="goTracks()">⮜ TRACKS</button>
    <span class="sname" id="songTitle"></span>
    <span class="meta" id="songMeta"></span>
    <span class="fontctl">
      <button class="btn sm" onclick="bump(-1)">A−</button>
      <button class="btn sm" onclick="bump(1)">A+</button>
    </span>
    <span class="badge" id="whoBadge2">P1</span>
  </div>
  <div class="headrow"><span class="a">LINE</span><span class="b">CHORDS</span><span class="c">YOU ▸ <span id="youName">P</span></span></div>
  <div class="song-body" id="songBody"></div>
</section>

rds": "A G C D", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Humma Humma", "chords": "F E D G", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Andha Arabi Kadaloram", "chords": "A G A G", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Andha Kanni Thendral", "chords": "A A G D", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Humma Humma", "chords": "A G C D", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Humma Humma", "chords": "F E D G", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Palli Tharmaraye", "chords": "A G A G", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Un Pattu Thaavani", "chords": "A A G D", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Humma Humma", "chords": "A G C D", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}, {"section": "", "line": "Humma Humma", "chords": "F E D G", "times": "", "players": {"VIJITH": "", "SAGAR": "", "AKHIL": ""}}]}, {"name": "Kunjikkavil", "players": [], "rows": [{"section": "", "line": "Arun", "chords": "", "times": "", "players": {}}, {"section": "", "line": "Ending transition to cold' play", "chords": "", "times": "", "players": {}}]}]};
const PLAYERS = [
  {key:'VIJITH', ava:'🎸', role:'Guitar / Lead', tag:'P1'},
  {key:'SAGAR',  ava:'🎹', role:'Keys / Rhythm', tag:'P2'},
  {key:'SHREDDU',ava:'🎚️', role:'Guitar / FX',   tag:'P3'},
  {key:'AKHIL',  ava:'🥁', role:'Drums / Groove', tag:'P4'},
];
let CUR=null, curSongIndex=null, userFS=null;

let AC;
function blip(f=440,d=0.07,t='square'){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.06,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d);}catch(e){}}

function show(id){
  document.getElementById('wrap').classList.toggle('hidden', id==='screen-song');
  document.getElementById('screen-song').classList.toggle('on', id==='screen-song');
  document.body.classList.toggle('songmode', id==='screen-song');
  ['screen-player','screen-tracks'].forEach(s=>{
    const el=document.getElementById(s); if(el) el.classList.toggle('hidden', s!==id);
  });
  window.scrollTo(0,0);
}

function buildPlayers(){
  const g=document.getElementById('playerGrid');g.innerHTML='';
  PLAYERS.forEach(p=>{const d=document.createElement('div');d.className='pcard';d.tabIndex=0;
    d.innerHTML=`<div class="ava">${p.ava}</div><div class="pname">${p.key}</div><div class="role">${p.role}</div>`;
    d.onclick=()=>{blip(660);choosePlayer(p);};
    d.onkeydown=e=>{if(e.key==='Enter'){blip(660);choosePlayer(p);}};g.appendChild(d);});
}
function choosePlayer(p){CUR=p;
  document.getElementById('whoBadge').textContent=p.tag+' '+p.key;
  document.getElementById('whoBadge2').textContent=p.tag+' '+p.key;
  document.getElementById('youName').textContent=p.key;
  buildTracks();show('screen-tracks');}
function goPlayer(){blip(330);show('screen-player');}

function songHasContent(s){return s.rows.some(r=>r.section||r.line||r.chords);}
function buildTracks(){const g=document.getElementById('trackGrid');g.innerHTML='';
  DATA.songs.forEach((s,i)=>{const has=songHasContent(s);const youIn=s.players.includes(CUR.key);
    const d=document.createElement('div');d.className='track'+(has?'':' empty');
    d.innerHTML=`<div class="num">${String(i+1).padStart(2,'0')}</div>
      <div><div class="tname">${s.name}</div>${has?'':'<span class="tag-tbd">⚠ TEMPLATE / TBD</span>'}</div>
      <div class="you">${youIn?'🎯':''}</div>`;
    d.onclick=()=>{blip(550);openSong(i);};g.appendChild(d);});}
function goTracks(){blip(330);userFS=null;show('screen-tracks');}

function openSong(i){
  curSongIndex=i;userFS=null;
  const s=DATA.songs[i];
  document.getElementById('songTitle').textContent=s.name;
  const has=songHasContent(s);
  const youIn=s.players.includes(CUR.key);
  document.getElementById('songMeta').innerHTML=`${String(i+1).padStart(2,'0')}/${DATA.songs.length}`;
  const body=document.getElementById('songBody');body.innerHTML='';
  if(!has){body.innerHTML='<div class="note">▌ Blank template in the sheet — no chords entered yet ▐</div>';show('screen-song');return;}
  let secEl=null;
  s.rows.forEach(r=>{
    if(r.section){secEl=document.createElement('div');secEl.className='section';
      const h=document.createElement('div');h.className='sechead';h.textContent='▶ '+r.section.toUpperCase();
      secEl.appendChild(h);body.appendChild(secEl);}
    if(!secEl){secEl=document.createElement('div');secEl.className='section';body.appendChild(secEl);}
    if(!r.line && !r.chords && !Object.values(r.players).some(v=>v)) return;
    const mine=r.players[CUR.key];
    const row=document.createElement('div');row.className='row';
    const tm=r.times?`<span class="tm">${esc(r.times)}</span>`:'';
    const mineHtml = (mine && mine!=='-')
        ? `<div class="c-mine">${esc(mine)}</div>`
        : `<div class="c-mine empty">·</div>`;
    row.innerHTML=
      `<div class="c-line">${esc(r.line)||'<span class="dim">(inst.)</span>'}${tm}</div>
       <div class="c-chord">${esc(r.chords)||'<span class="dim">—</span>'}</div>
       ${mineHtml}`;
    secEl.appendChild(row);
  });
  show('screen-song');
  requestAnimationFrame(()=>fitToScreen());
}

// shrink font + add columns until the whole song fits with no scroll
function fitToScreen(){
  const body=document.getElementById('songBody');
  if(userFS){apply(userFS,chooseCols(userFS));return;}
  const sizes=[24,22,20,18,17,16,15,14,13,12,11,10,9];
  for(const fs of sizes){
    for(const cols of [1,2,3]){
      apply(fs,cols);
      if(body.scrollHeight<=body.clientHeight+2){return;}
    }
  }
  apply(9,3); // floor
}
function chooseCols(fs){
  const body=document.getElementById('songBody');
  for(const cols of [1,2,3]){apply(fs,cols);if(body.scrollHeight<=body.clientHeight+2)return cols;}
  return 3;
}
function apply(fs,cols){
  const body=document.getElementById('songBody');
  document.documentElement.style.setProperty('--fs',fs+'px');
  body.style.columnCount=cols;
}
function bump(dir){
  blip(dir>0?880:440,0.05);
  const cur=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'))||18;
  userFS=Math.max(9,Math.min(34,cur+dir*2));
  apply(userFS,chooseCols(userFS));
}
window.addEventListener('resize',()=>{if(document.body.classList.contains('songmode')&&curSongIndex!=null){
  if(userFS)apply(userFS,chooseCols(userFS));else fitToScreen();}});
document.addEventListener('keydown',e=>{
  if(!document.body.classList.contains('songmode'))return;
  if(e.key==='Escape')goTracks();
  if(e.key==='+'||e.key==='=')bump(1);
  if(e.key==='-')bump(-1);
});
function esc(t){return(t==null?'':String(t)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

buildPlayers();show('screen-player');
</script>
