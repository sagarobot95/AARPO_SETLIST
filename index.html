<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AARPO * SET LIST</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--neon:#ff2e88;--cyan:#00f0ff;--yellow:#ffe600;--green:#39ff14;--purple:#9d00ff;--bg:#0a0420;--panel:#160a33;--fs:20px;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{background:radial-gradient(circle at 50% -10%, #2a0a55 0%, var(--bg) 60%),repeating-linear-gradient(0deg, rgba(0,240,255,.04) 0 2px, transparent 2px 4px);color:#fff;font-family:'VT323','Courier New',monospace;font-size:20px;-webkit-font-smoothing:none;}
body.songmode{overflow:hidden;}
body::before{content:"";position:fixed;left:-50%;right:-50%;bottom:-20%;height:55vh;background:linear-gradient(transparent 0%, rgba(157,0,255,.13) 100%),repeating-linear-gradient(90deg, rgba(0,240,255,.30) 0 2px, transparent 2px 40px),repeating-linear-gradient(0deg, rgba(0,240,255,.30) 0 2px, transparent 2px 40px);transform:perspective(300px) rotateX(70deg);transform-origin:bottom;z-index:0;pointer-events:none;animation:grid 6s linear infinite;}
@keyframes grid{from{background-position:0 0,0 0,0 0;}to{background-position:0 0,0 40px,0 40px;}}
.crt{position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);mix-blend-mode:multiply;}
.crt::after{content:"";position:fixed;inset:0;box-shadow:inset 0 0 200px rgba(0,0,0,.9);}
.wrap{position:relative;z-index:10;max-width:1000px;margin:0 auto;padding:24px 16px 60px;}
.hidden{display:none!important;}
.title{font-family:'Press Start 2P',monospace;text-align:center;line-height:1.5;}
.title .big{font-size:34px;color:var(--yellow);text-shadow:3px 3px 0 var(--neon),6px 6px 0 var(--purple);letter-spacing:2px;}
.title .sub{font-size:14px;color:var(--cyan);margin-top:14px;text-shadow:2px 2px 0 #003;animation:blink 1.1s steps(1) infinite;}
@keyframes blink{50%{opacity:.25;}}
.h2{font-family:'Press Start 2P',monospace;font-size:15px;color:var(--green);text-shadow:2px 2px 0 #000;margin:6px 0 18px;text-align:center;letter-spacing:1px;}
.insert{font-family:'Press Start 2P',monospace;font-size:10px;color:#9fb;text-align:center;margin-top:8px;opacity:.7;}
.players{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:30px;}
.pcard{cursor:pointer;border:4px solid var(--cyan);background:var(--panel);padding:26px 14px;text-align:center;position:relative;box-shadow:0 0 0 4px #000,6px 6px 0 var(--purple);transition:transform .08s,box-shadow .08s;}
.pcard:hover,.pcard:focus{transform:translate(-2px,-2px);box-shadow:0 0 0 4px #000,9px 9px 0 var(--neon);outline:none;border-color:var(--yellow);}
.pcard .ava{font-size:46px;line-height:1;}
.pcard .pname{font-family:'Press Start 2P',monospace;font-size:14px;margin-top:14px;color:var(--yellow);}
.pcard .role{font-size:18px;color:var(--cyan);margin-top:6px;}
.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.badge{font-family:'Press Start 2P',monospace;font-size:11px;color:#000;background:var(--green);padding:8px 12px;border:3px solid #000;box-shadow:3px 3px 0 var(--purple);}
.btn{font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;color:#000;background:var(--yellow);border:3px solid #000;padding:9px 12px;box-shadow:3px 3px 0 var(--neon);transition:transform .06s;}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--neon);}
.btn:disabled{opacity:.5;cursor:wait;}
.btn.alt{background:var(--cyan);}
.btn.sm{font-size:9px;padding:7px 9px;}
.syncstat{font-size:16px;color:#9fb;flex:1;text-align:left;}
.spin{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tracks{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.track{cursor:pointer;border:3px solid var(--neon);background:var(--panel);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:4px 4px 0 #000;transition:transform .07s,box-shadow .07s;position:relative;}
.track:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--cyan);border-color:var(--yellow);}
.track .num{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--cyan);min-width:34px;}
.track .tname{font-size:22px;color:#fff;line-height:1.1;}
.track .you{position:absolute;top:6px;right:8px;font-size:13px;}
.track.empty{opacity:.55;border-style:dashed;}
.tag-tbd{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow);display:block;margin-top:4px;}
#screen-song{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;padding:8px 12px 8px;}
#screen-song.on{display:flex;}
.songbar{display:flex;align-items:center;gap:10px;flex-wrap:nowrap;margin-bottom:4px;}
.songbar .sname{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--yellow);text-shadow:2px 2px 0 var(--neon);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.songbar .meta{font-size:15px;color:var(--cyan);white-space:nowrap;}
.fontctl{display:flex;gap:4px;}
.metbar{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin:3px 0;}
.metplays{display:flex;gap:5px;}
.metbar .metplay{min-width:70px;background:var(--neon);color:#fff;}
.metbar .metplay.sel{background:var(--cyan);color:#000;}
.metbar .metplay.on{background:var(--green);color:#000;}
.metbar .metsnd{background:#fff;min-width:64px;}
.metvol{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--cyan);min-width:14px;text-align:center;}
.metdot{width:16px;height:16px;border-radius:50%;background:#333;border:2px solid #000;transition:background .04s,box-shadow .04s;}
.metdot.beat{background:var(--green);box-shadow:0 0 10px var(--green);}
.metdot.acc{background:var(--yellow);box-shadow:0 0 12px var(--yellow);}
.songinfo{font-size:17px;margin:2px 0 4px;line-height:1.2;}
.songinfo .k{font-family:'Press Start 2P',monospace;font-size:10px;padding:3px 6px;margin-right:6px;border:2px solid #000;}
.songinfo .key{background:var(--yellow);color:#000;}
.songinfo .bpm{background:var(--cyan);color:#000;}
.songinfo .tone{background:var(--green);color:#000;}
.tposectl{display:flex;gap:4px;align-items:center;}
.tposectl #tposeLbl{min-width:34px;text-align:center;background:var(--cyan);}
.song-body{flex:1;min-height:0;overflow:hidden;column-gap:20px;column-fill:balance;}
.song-body.scroll{overflow-y:auto;column-count:1!important;scrollbar-width:thin;scrollbar-color:var(--neon) transparent;}
.song-body.scroll::-webkit-scrollbar{width:10px;}
.song-body.scroll::-webkit-scrollbar-thumb{background:var(--neon);border-radius:6px;}
.song-body.nochords .row{grid-template-columns:1.3fr 1fr;}
.song-body.nochords .c-chord{display:none;}
.section{break-inside:auto;margin-bottom:6px;}
.sechead{font-family:'Press Start 2P',monospace;font-size:calc(var(--fs)*0.62);color:#fff;background:var(--purple);padding:4px 7px;letter-spacing:1px;text-shadow:1px 1px 0 #000;break-after:avoid;margin-bottom:2px;}
.row{display:grid;grid-template-columns:1.1fr 1.15fr 1fr;gap:8px;padding:2px 6px;align-items:start;break-inside:avoid;border-bottom:1px solid rgba(0,240,255,.12);}
.row:nth-child(odd){background:rgba(0,240,255,.04);}
.c-line{font-size:var(--fs);color:#fff;line-height:1.15;}
.c-line .tm{font-family:'Press Start 2P',monospace;font-size:calc(var(--fs)*0.5);color:#000;background:var(--yellow);padding:1px 4px;margin-left:5px;border:1px solid #000;}
.c-chord{font-family:'Courier New',monospace;font-size:calc(var(--fs)*0.95);color:var(--cyan);white-space:pre-wrap;line-height:1.15;text-shadow:0 0 5px rgba(0,240,255,.45);}
.c-mine{font-size:calc(var(--fs)*0.92);color:var(--green);line-height:1.15;background:rgba(57,255,20,.10);border-left:4px solid var(--green);padding:1px 6px;}
.c-mine.empty{background:none;border-left:4px solid rgba(255,255,255,.08);color:#445;}
.dim{opacity:.35;}
.note{text-align:center;color:var(--yellow);font-size:22px;padding:40px;}
.headrow{display:grid;grid-template-columns:1.1fr 1.15fr 1fr;gap:8px;padding:2px 6px;font-family:'Press Start 2P',monospace;font-size:9px;margin-bottom:3px;border-bottom:2px solid var(--neon);}
.headrow .a{color:#fff;}.headrow .b{color:var(--cyan);}.headrow .c{color:var(--green);}
.footer{text-align:center;margin-top:30px;font-size:14px;color:#557;}
@media(max-width:560px){.players{grid-template-columns:1fr;}.title .big{font-size:24px;}}
</style>
</head>
<body>
<div class="crt"></div>
<div class="wrap" id="wrap">
  <section id="screen-player">
    <div class="title"><div class="big">AARPO</div><div class="sub">* SET LIST *</div></div>
    <div class="h2">SELECT YOUR PLAYER</div>
    <div class="players" id="playerGrid"></div>
    <div class="insert">(c) 198X AARPO BAND - INSERT COIN</div>
  </section>
  <section id="screen-tracks" class="hidden">
    <div class="bar">
      <span class="badge" id="whoBadge">P1</span>
      <div class="title" style="flex:1"><div class="sub" style="font-size:11px">SELECT TRACK</div></div>
      <button class="btn alt" onclick="goPlayer()">&#9668; CHANGE PLAYER</button>
    </div>
    <div class="bar" style="margin-top:-2px">
      <button class="btn" id="syncBtn" onclick="syncFromSheets()">&#8635; SYNC FROM SHEETS</button>
      <span id="syncStatus" class="syncstat"></span>
    </div>
    <div class="tracks" id="trackGrid"></div>
  </section>
</div>
<section id="screen-song">
  <div class="songbar">
    <button class="btn sm" onclick="goTracks()">&#9668; TRACKS</button>
    <button class="btn sm" id="syncBtnSong" title="Sync from Google Sheets" onclick="syncFromSheets()">&#8635;</button>
    <span class="sname" id="songTitle"></span>
    <span class="meta" id="songMeta"></span>
    <span class="tposectl" id="tposeCtl" title="Transpose chords">
      <button class="btn sm" onclick="changeTpose(-1)" title="Down a semitone">&#9837;</button>
      <button class="btn sm" id="tposeLbl" onclick="resetTpose()" title="Reset to original key">0</button>
      <button class="btn sm" onclick="changeTpose(1)" title="Up a semitone">&#9839;</button>
    </span>
    <span class="fontctl">
      <button class="btn sm" id="modeBtn" title="Fit-to-page / Scroll" onclick="toggleMode()">FIT</button>
      <button class="btn sm" onclick="bump(-1)">A&#8722;</button>
      <button class="btn sm" onclick="bump(1)">A+</button>
    </span>
    <span class="badge" id="whoBadge2">P1</span>
  </div>
  <div class="metbar" id="metBar">
    <span class="metplays" id="metPlays"></span>
    <button class="btn sm" onclick="metBpmAdj(-1)" title="Slower">&#8722;</button>
    <button class="btn sm" onclick="metBpmAdj(1)" title="Faster">+</button>
    <button class="btn sm" id="metReset" onclick="metBpmReset()" title="Back to sheet tempo">&#8635;BPM</button>
    <button class="btn sm metsnd" id="metSound" onclick="metCycleSound()" title="Metronome sound">Beep</button>
    <button class="btn sm" onclick="metVolAdj(-1)" title="Quieter">&#128261;</button>
    <span class="metvol" id="metVol">3</span>
    <button class="btn sm" onclick="metVolAdj(1)" title="Louder">&#128266;</button>
    <span class="metdot" id="metDot"></span>
  </div>
  <div class="songinfo" id="songInfo"></div>
  <div class="headrow" id="headRow"><span class="a">LINE</span><span class="b">CHORDS</span><span class="c">YOU &#9656; <span id="youName">P</span></span></div>
  <div class="song-body" id="songBody"></div>
</section>

function roleInstrument(role){
  const r=(role||'').toUpperCase();
  if(/DRUM/.test(r))      return {ava:'\u{1F941}',chords:false}; // drum kit
  if(/PERCUSS/.test(r))   return {ava:'\u{1FA98}',chords:false}; // percussion
  if(/BASS/.test(r))      return {ava:'\u{1D122}',chords:true};  // bass guitar (bass-clef glyph)
  if(/SYNTH|PIANO|KEY/.test(r)) return {ava:'\u{1F3B9}',chords:true}; // keys
  if(/VIOLIN/.test(r))    return {ava:'\u{1F3BB}',chords:true};
  if(/VOCAL|SING/.test(r))return {ava:'\u{1F3A4}',chords:true};
  return {ava:'\u{1F3B8}',chords:true};                          // guitars & default
}

      rows.push({section:section,line:line,chords:chords,times:times,players:players});
  }
  const players=Object.keys(pcols).map(i=>pcols[i]).filter((v,i,a)=>a.indexOf(v)===i).sort();
  return {name:name,players:players,rows:rows};
}
function gvizToSong(name,resp){
  const t=resp&&resp.table;const grid=((t&&t.rows)||[]).map(r=>(r.c||[]).map(c=>c&&c.v!=null?String(c.v):''));
  return gridToSong(name,grid);
}
// ---------- LEGEND tab: per-song key / tempo / tone, matched to song tabs ----------
function isLegend(title){return (title||'').trim().toUpperCase()==='LEGEND';}
// Returns {meta:[song key/tempo/tone], roster:[{key,role}]}.
// The legend has a song table, then a PLAYER/ROLE table starting at a "PLAYER" row.
function parseLegend(grid){
  const res={meta:[],roster:[]};
  if(!grid||!grid.length) return res;
  const hdr=grid[0].map(h=>((h||'')+'').trim());
  let mode='meta';
  for(let r=1;r<grid.length;r++){const g=grid[r]||[];
    const c0=((g[0]||'')+'').trim();
    if(c0.toUpperCase()==='PLAYER'){mode='roster';continue;}
    if(!c0) continue;
    if(mode==='meta'){
      const tones={};for(let k=3;k<hdr.length;k++){if(hdr[k]){const v=((g[k]||'')+'').trim();if(v&&v!=='-'&&v!=='—')tones[hdr[k].toUpperCase()]=v;}}
      res.meta.push({name:c0,scale:((g[1]||'')+'').trim(),tempo:((g[2]||'')+'').trim(),tones:tones});
    }else{
      res.roster.push({key:c0.toUpperCase(),role:((g[1]||'')+'').trim()});
    }
  }
  return res;
}
function lgNorm(s){return (s||'').toLowerCase().replace(/madhu/g,'madu').replace(/maalai/g,'malai').replace(/urvashi/g,'urvasi').replace(/[^a-z]/g,'');}
function lgToks(s){return (s||'').toLowerCase().replace(/[^a-z ]/g,'').split(/\s+/).filter(Boolean);}
function lgDice(a,b){if(a===b)return 1;if(a.length<2||b.length<2)return 0;
  const bg=s=>{const m={};for(let i=0;i<s.length-1;i++){const g=s.substr(i,2);m[g]=(m[g]||0)+1;}return m;};
  const A=bg(a),B=bg(b);let inter=0,tot=0;
  for(const g in A){tot+=A[g];if(B[g])inter+=Math.min(A[g],B[g]);}
  for(const g in B)tot+=B[g];
  return tot?2*inter/tot:0;}
function lgScore(tab,leg){const a=lgNorm(tab),b=lgNorm(leg);
  const cont=(a&&(b.indexOf(a)>=0||a.indexOf(b)>=0))?2:0;
  const ta=lgToks(tab),tb=lgToks(leg);const ov=ta.filter(t=>tb.indexOf(t)>=0).length;
  return cont+ov+lgDice(a,b);}
// Attach key/tempo/tone to each song AND order the setlist by the LEGEND row
// sequence. Tabs not found in the legend keep their original order at the end.
function attachLegend(songs,leg){
  if(!leg||!leg.length) return songs;
  songs.forEach(s=>{
    let best=null,bs=0,bi=-1;
    leg.forEach((L,idx)=>{const sc=lgScore(s.name,L.name);if(sc>bs){bs=sc;best=L;bi=idx;}});
    if(best&&bs>=1.0) s.lg={scale:best.scale,tempo:best.tempo,tones:best.tones,src:best.name,order:bi};
    else delete s.lg;
  });
  return songs.map((s,i)=>({s:s,i:i})).sort((a,b)=>{
    const oa=a.s.lg?a.s.lg.order:1e9, ob=b.s.lg?b.s.lg.order:1e9;
    return (oa-ob)||(a.i-b.i);
  }).map(x=>x.s);
}
// Sheets API v4 (needs API_KEY): one request returns ALL tabs in order,
// including any newly added tabs and player columns. Order follows the sheet.
async function syncViaApi(){
  const fields='sheets(properties(title,index),data(rowData(values(formattedValue))))';
  const url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+
            '?includeGridData=true&fields='+encodeURIComponent(fields)+'&key='+API_KEY;
  const res=await fetch(url);
  if(!res.ok) throw new Error('api '+res.status);
  const j=await res.json();
  const sheets=(j.sheets||[]).slice().sort((a,b)=>((a.properties&&a.properties.index)||0)-((b.properties&&b.properties.index)||0));
  const toGrid=sh=>{const rd=(sh.data&&sh.data[0]&&sh.data[0].rowData)||[];
    return rd.map(row=>(row.values||[]).map(c=>c&&c.formattedValue!=null?String(c.formattedValue):''));};
  let leg={meta:[],roster:[]};
  const songs=[];
  sheets.forEach(sh=>{const title=(sh.properties&&sh.properties.title)||'';
    if(isLegend(title)) leg=parseLegend(toGrid(sh));     // pull out LEGEND
    else songs.push(gridToSong(title,toGrid(sh)));        // everything else is a song
  });
  return {songs:attachLegend(songs,leg.meta),roster:leg.roster};
}
async function syncViaJsonp(){
  const songs=await Promise.all(SHEET_NAMES.map(n=>jsonp(n).then(r=>gvizToSong(n,r))));
  let leg={meta:[],roster:[]};
  try{const lr=await jsonp('LEGEND');
    const grid=((lr&&lr.table&&lr.table.rows)||[]).map(r=>(r.c||[]).map(c=>c&&c.v!=null?String(c.v):''));
    leg=parseLegend(grid);}catch(e){}
  return {songs:attachLegend(songs,leg.meta),roster:leg.roster};
}
async function syncFromSheets(){
  const btn=document.getElementById('syncBtn');
  const sbtn=document.getElementById('syncBtnSong');
  setStatus('<span class="spin">&#8635;</span> SYNCING...','#ffe600');
  if(btn)btn.disabled=true;
  if(sbtn){sbtn.disabled=true;sbtn.innerHTML='<span class="spin">&#8635;</span>';}
  try{
    const r = API_KEY ? await syncViaApi() : await syncViaJsonp();
    DATA.songs=r.songs;if(r.roster&&r.roster.length)DATA.roster=r.roster;
    dataSource='synced';lastSync=Date.now();
    try{localStorage.setItem('aarpo_data',JSON.stringify({t:lastSync,songs:DATA.songs,roster:DATA.roster}));}catch(e){}
    buildRoster();buildPlayers();
    if(CUR)buildTracks();
    updateStatus();blip(990,0.08);
    if(document.body.classList.contains('songmode') && curSongIndex!=null) openSong(curSongIndex);
    if(sbtn)flashSongSync('&#10003;','#39ff14');
  }catch(e){
    setStatus('X SYNC FAILED - check Wi-Fi / sheet sharing. Using '+(dataSource==='built-in'?'built-in':'saved')+' copy.','#ff7a7a');
    blip(160,0.15,'sawtooth');
    if(sbtn)flashSongSync('X','#ff7a7a');
  }finally{
    if(btn)btn.disabled=false;
    if(sbtn)sbtn.disabled=false;
  }
}
function flashSongSync(sym,color){const sbtn=document.getElementById('syncBtnSong');if(!sbtn)return;
  sbtn.innerHTML=sym;sbtn.style.background=color;
  setTimeout(()=>{sbtn.innerHTML='&#8635;';sbtn.style.background='';},1400);}
function updateStatus(){
  if(dataSource==='synced'||dataSource==='saved'){
    const d=lastSync?new Date(lastSync):null;
    const when=d?d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    setStatus((dataSource==='synced'?'&#9679; LIVE SYNCED ':'&#9679; SAVED COPY ')+when+' &middot; tap to refresh','#39ff14');
  }else{
    setStatus('&#9679; BUILT-IN COPY (offline) &middot; tap SYNC for latest from Google Sheets','#9fb');
  }
}
function setStatus(html,color){const el=document.getElementById('syncStatus');el.innerHTML=html;el.style.color=color||'#9fb';}

const SCROLL_FS=22;
let viewMode='fit';
try{const vm=localStorage.getItem('aarpo_viewmode');if(vm==='scroll'||vm==='fit')viewMode=vm;}catch(e){}
function updateModeBtn(){const b=document.getElementById('modeBtn');if(b)b.textContent=(viewMode==='scroll'?'SCROLL':'FIT');}
function setHeadrow(){
  const hr=document.getElementById('headRow');if(!hr)return;
  const you='YOU &#9656; '+esc(CUR.key);
  if(CUR.chords){hr.style.gridTemplateColumns='1.1fr 1.15fr 1fr';
    hr.innerHTML='<span class="a">LINE</span><span class="b">CHORDS</span><span class="c">'+you+'</span>';}
  else{hr.style.gridTemplateColumns='1.3fr 1fr';
    hr.innerHTML='<span class="a">SECTION / LINE</span><span class="c">'+you+'</span>';}
}
// ---------- chord transposition (always spells with sharps, like the sheet) ----------
const SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_IDX={C:0,'C#':1,DB:1,D:2,'D#':3,EB:3,E:4,'E#':5,FB:4,F:5,'F#':6,GB:6,G:7,'G#':8,AB:8,A:9,'A#':10,BB:10,B:11,'B#':0,CB:11};
function transposeNote(L,acc,steps){
  const key=(L+(acc||'')).toUpperCase().replace('♯','#').replace('♭','B');
  const idx=NOTE_IDX[key];
  if(idx==null) return L+(acc||'');
  return SHARP[((idx+steps)%12+12)%12];
}
// shift only chord roots (and bass notes after '/'); leave suffixes, spacing, text intact
function transposeChords(text,steps){
  if(!steps||!text) return text;
  return text.replace(/([A-G])(#|b|♯|♭)?/g,(m,L,acc,offset,str)=>{
    const prev=offset>0?str[offset-1]:'';
    if(prev && /[A-Za-z]/.test(prev)) return m;            // mid-word, not a chord
    const fc=str.charAt(offset+m.length);
    if(fc && /[a-z]/.test(fc) && 'masd'.indexOf(fc)<0) return m;  // followed by a word
    return transposeNote(L,acc,steps);
  });
}
function changeTpose(d){blip(d>0?700:500,0.05);
  tpose=Math.max(-11,Math.min(11,tpose+d));updateTposeLabel();renderSong();}
function resetTpose(){if(!tpose)return;blip(440,0.05);tpose=0;updateTposeLabel();renderSong();}
function updateTposeLabel(){const el=document.getElementById('tposeLbl');
  if(el)el.textContent=(tpose>0?'+'+tpose:''+tpose);}

function renderInfo(s){
  const el=document.getElementById('songInfo');const lg=s.lg;
  if(!lg){el.style.display='none';el.innerHTML='';return;}
  let h='';
  if(lg.scale)h+='<span class="k key">KEY '+esc(lg.scale)+'</span>';
  if(lg.tempo)h+='<span class="k bpm">'+esc(lg.tempo)+' BPM</span>';
  const tone=lg.tones&&lg.tones[CUR.key];
  if(tone)h+='<span class="k tone">'+esc(CUR.key)+': '+esc(tone)+'</span>';
  el.innerHTML=h;el.style.display=h?'':'none';
}
function openSong(i){
  curSongIndex=i;userFS=null;tpose=0;updateTposeLabel();
  metStop();metSetSong((DATA.songs[i].lg||{}).tempo);   // reset metronome to this song's tempo
  renderSong();
}
function renderSong(){
  const s=DATA.songs[curSongIndex];
  document.getElementById('songTitle').textContent=s.name;
  document.getElementById('songMeta').innerHTML=String(curSongIndex+1).padStart(2,'0')+'/'+DATA.songs.length+' '+(CUR.role||'');
  document.getElementById('tposeCtl').style.display=CUR.chords?'':'none';
  renderInfo(s);
  setHeadrow();
  const body=document.getElementById('songBody');body.innerHTML='';
  body.classList.toggle('nochords', !CUR.chords);
  if(!songHasContent(s)){body.innerHTML='<div class="note">No chords entered for this track yet</div>';show('screen-song');return;}
  let secEl=null;
  s.rows.forEach(r=>{
    if(r.section){secEl=document.createElement('div');secEl.className='section';
      const h=document.createElement('div');h.className='sechead';h.textContent='▶ '+r.section.toUpperCase();
      secEl.appendChild(h);body.appendChild(secEl);}
    if(!secEl){secEl=document.createElement('div');secEl.className='section';body.appendChild(secEl);}
    if(!r.line && !r.chords && !Object.keys(r.players).some(k=>r.players[k])) return;
    const mine=r.players[CUR.key];
    const row=document.createElement('div');row.className='row';
    const tm=r.times?'<span class="tm">'+esc(r.times)+'</span>':'';
    const mineHtml=(mine&&mine!=='-')?'<div class="c-mine">'+esc(mine)+'</div>':'<div class="c-mine empty">&middot;</div>';
    const chordTxt=r.chords?esc(transposeChords(r.chords,tpose)):'<span class="dim">&mdash;</span>';
    const chordCell=CUR.chords?('<div class="c-chord">'+chordTxt+'</div>'):'';
    row.innerHTML='<div class="c-line">'+(esc(r.line)||'<span class="dim">(inst.)</span>')+tm+'</div>'+chordCell+mineHtml;
    secEl.appendChild(row);
  });
  show('screen-song');requestAnimationFrame(reflow);
}
// choose layout based on the active view mode
function reflow(){
  const body=document.getElementById('songBody');
  if(viewMode==='scroll'){
    body.classList.add('scroll');
    apply(userFS||SCROLL_FS,1);
    body.scrollTop=0;
  }else{
    body.classList.remove('scroll');
    fitToScreen();
  }
}
function fitToScreen(){const body=document.getElementById('songBody');
  if(userFS){apply(userFS,chooseCols(userFS));return;}
  const sizes=[24,22,20,18,17,16,15,14,13,12,11,10,9];
  for(const fs of sizes){for(const cols of [1,2,3]){apply(fs,cols);
    if(body.scrollHeight<=body.clientHeight+2)return;}}
  apply(9,3);}
function chooseCols(fs){const body=document.getElementById('songBody');
  for(const cols of [1,2,3]){apply(fs,cols);if(body.scrollHeight<=body.clientHeight+2)return cols;}return 3;}
function apply(fs,cols){document.documentElement.style.setProperty('--fs',fs+'px');
  document.getElementById('songBody').style.columnCount=cols;}
function bump(dir){blip(dir>0?880:440,0.05);
  const cur=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'))||18;
  userFS=Math.max(9,Math.min(40,cur+dir*2));reflow();}
function toggleMode(){blip(520,0.05);
  viewMode=(viewMode==='scroll'?'fit':'scroll');userFS=null;
  try{localStorage.setItem('aarpo_viewmode',viewMode);}catch(e){}
  updateModeBtn();reflow();}
window.addEventListener('resize',()=>{if(document.body.classList.contains('songmode')&&curSongIndex!=null)reflow();});
document.addEventListener('keydown',e=>{if(!document.body.classList.contains('songmode'))return;
  if(e.key==='Escape')goTracks();if(e.key==='+'||e.key==='=')bump(1);if(e.key==='-')bump(-1);});
updateModeBtn();
function esc(t){return(t==null?'':String(t)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===================== METRONOME =====================
const MET_SOUNDS=['Beep','Wood','Click','Cowbell','Tick'];
let met={on:false,bpms:[100],activeIdx:0,bpm:100,baseBpm:100,beat:0,next:0,timer:null,sound:'Beep',vol:3};
try{const mp=JSON.parse(localStorage.getItem('aarpo_met')||'null');
  if(mp){if(MET_SOUNDS.indexOf(mp.sound)>=0)met.sound=mp.sound;if(typeof mp.vol==='number')met.vol=Math.max(0,Math.min(5,mp.vol));}}catch(e){}
function metSavePrefs(){try{localStorage.setItem('aarpo_met',JSON.stringify({sound:met.sound,vol:met.vol}));}catch(e){}}
// a song may list more than one tempo (e.g. "95 / 120" or "120 -> 160") -> one button each
function bpmsFromTempo(t){const ns=((t||'')+'').match(/\d+/g);
  let a=ns?ns.map(n=>parseInt(n,10)).filter(n=>n>=20&&n<=400):[];
  a=a.filter((v,i)=>a.indexOf(v)===i);return a.length?a:[100];}
function ensureAC(){AC=AC||new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function metClick(time,accent){
  const v=(met.vol/5)*(accent?1:0.65); if(v<=0) return;
  const s=met.sound;
  if(s==='Click'){
    const dur=0.022,buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*dur),AC.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=AC.createBufferSource();src.buffer=buf;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=accent?2200:1600;
    const g=AC.createGain();g.gain.value=v;src.connect(hp);hp.connect(g);g.connect(AC.destination);
    src.start(time);src.stop(time+dur);return;
  }
  let type='square',freq=accent?1000:800,dur=0.03;
  if(s==='Wood'){type='triangle';freq=accent?1350:1050;dur=0.025;}
  else if(s==='Cowbell'){type='square';freq=accent?845:620;dur=0.09;}
  else if(s==='Tick'){type='sine';freq=accent?2100:1650;dur=0.016;}
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=freq;
  o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(v,time);
  g.gain.exponentialRampToValueAtTime(0.0001,time+dur);o.start(time);o.stop(time+dur);
  if(s==='Cowbell'){const o2=AC.createOscillator(),g2=AC.createGain();o2.type='square';o2.frequency.value=accent?1150:900;
    o2.connect(g2);g2.connect(AC.destination);g2.gain.setValueAtTime(v*0.55,time);
    g2.gain.exponentialRampToValueAtTime(0.0001,time+dur);o2.start(time);o2.stop(time+dur);}
}
function metFlash(accent){const d=document.getElementById('metDot');if(!d)return;
  d.classList.remove('beat','acc');void d.offsetWidth;d.classList.add(accent?'acc':'beat');
  setTimeout(()=>{d.classList.remove('beat','acc');},90);}
function metSchedule(){
  const spb=60/Math.max(20,Math.min(400,met.bpm));
  while(met.next < AC.currentTime + 0.12){
    const accent=(met.beat%4===0);
    metClick(met.next,accent);
    const dt=(met.next-AC.currentTime)*1000;
    setTimeout(()=>metFlash(accent),Math.max(0,dt));
    met.next+=spb;met.beat++;
  }
  met.timer=setTimeout(metSchedule,25);
}
// one play button per tempo; only one runs at a time (clicking another switches)
function renderMetButtons(){
  const c=document.getElementById('metPlays');if(!c)return;c.innerHTML='';
  met.bpms.forEach((b,i)=>{const btn=document.createElement('button');
    btn.className='btn sm metplay';btn.onclick=(function(idx){return function(){metPlayBpm(idx);};})(i);
    c.appendChild(btn);});
  updateMetButtons();
}
function updateMetButtons(){
  const c=document.getElementById('metPlays');if(c){
    const kids=c.children;
    for(let i=0;i<kids.length;i++){const active=(i===met.activeIdx),playing=active&&met.on;
      const val=active?met.bpm:met.bpms[i];
      kids[i].classList.toggle('on',playing);kids[i].classList.toggle('sel',active&&!playing);
      kids[i].innerHTML=(playing?'&#10074;&#10074; ':'&#9654; ')+val;}
  }
  const rb=document.getElementById('metReset');if(rb)rb.style.opacity=(met.bpm!==met.baseBpm)?'1':'.45';
}
function metStart(){if(met.on)return;ensureAC();met.on=true;met.beat=0;met.next=AC.currentTime+0.06;updateMetButtons();metSchedule();}
function metStop(){met.on=false;if(met.timer)clearTimeout(met.timer);met.timer=null;updateMetButtons();
  const d=document.getElementById('metDot');if(d)d.classList.remove('beat','acc');}
function metPlayBpm(i){
  if(met.on&&met.activeIdx===i){blip(440,0.04);metStop();return;}   // tap active = stop
  met.activeIdx=i;met.baseBpm=met.bpms[i];met.bpm=met.baseBpm;blip(720,0.04);
  if(!met.on){metStart();}                                          // switch tempo / start
  else{met.beat=0;met.next=ensureAC().currentTime+0.06;updateMetButtons();}
}
function metToggle(){metPlayBpm(met.activeIdx);}                     // (keyboard fallback)
function metBpmAdj(d){met.bpm=Math.max(30,Math.min(300,met.bpm+d));blip(d>0?760:560,0.03);updateMetButtons();}
function metBpmReset(){if(met.bpm===met.baseBpm)return;met.bpm=met.baseBpm;blip(440,0.04);updateMetButtons();}
function metSetSong(tempo){metStop();met.bpms=bpmsFromTempo(tempo);met.activeIdx=0;
  met.baseBpm=met.bpms[0];met.bpm=met.baseBpm;renderMetButtons();}
function metCycleSound(){const i=MET_SOUNDS.indexOf(met.sound);met.sound=MET_SOUNDS[(i+1)%MET_SOUNDS.length];
  document.getElementById('metSound').textContent=met.sound;metSavePrefs();ensureAC();metClick(AC.currentTime+0.01,true);}
function metVolAdj(d){met.vol=Math.max(0,Math.min(5,met.vol+d));document.getElementById('metVol').textContent=met.vol;
  metSavePrefs();if(met.vol>0){ensureAC();metClick(AC.currentTime+0.01,false);}}
function metInitUI(){document.getElementById('metSound').textContent=met.sound;
  document.getElementById('metVol').textContent=met.vol;renderMetButtons();}

buildRoster();buildPlayers();metInitUI();show('screen-player');
</script>
